# GRUB2 Configuration for UnixOS
#
# Usage:
#   1. Build kernel: make kernel
#   2. Build initramfs: make initramfs
#   3. Create ISO: make iso
#   4. Boot: qemu-system-i386 -cdrom build/unixos.iso

set timeout=0
set default=0

menuentry "UnixOS (with initramfs)" {
    multiboot2 /boot/kernel.elf
    module2 /boot/initramfs.cpio
    boot
}

menuentry "UnixOS (kernel only)" {
    multiboot2 /boot/kernel.elf
    boot
}

menuentry "UnixOS (debug mode)" {
    multiboot2 /boot/kernel.elf debug
    module2 /boot/initramfs.cpio
    boot
}
